<!DOCTYPE html>
<html>
<head>
    <title>Pips Pro</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .container { width: 400px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .session { margin-bottom: 20px; padding: 15px; border-left: 4px solid #3498db; background: #252525; }
        .session.ny { border-color: #e74c3c; }
        .session.london { border-color: #f1c40f; }
        .pip-val { font-size: 24px; font-weight: bold; color: #2ecc71; }
        .pip-val.neg { color: #e74c3c; }
        h1 { font-size: 18px; margin-bottom: 20px; color: #888; text-transform: uppercase; }
        .label { font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live Edge Tracker</h1>
        <div id="tracker-body">
            </div>
    </div>

    <script>
        async function updateStats() {
            const res = await fetch('/api/tracker');
            const data = await res.json();
            
            const sessions = ['daily', 'london', 'ny'];
            let html = '';
            
            sessions.forEach(s => {
                const val = data[s].dist;
                const colorClass = val < 0 ? 'neg' : '';
                html += `
                    <div class="session ${s}">
                        <div class="label">${s.toUpperCase()} OPEN: ${data[s].open}</div>
                        <div class="pip-val ${colorClass}">${val} Pips</div>
                        <div class="label">Distance from Open</div>
                    </div>
                `;
            });
            document.getElementById('tracker-body').innerHTML = html;
        }
        setInterval(updateStats, 5000); // Update every 5 seconds
        updateStats();
    </script>
</body>
</html>
